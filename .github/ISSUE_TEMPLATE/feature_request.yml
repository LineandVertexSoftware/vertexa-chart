name: Feature request
description: Suggest a new chart type, API method, or other improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check [existing issues](https://github.com/LineandVertexSoftware/vertexa-chart/issues) to see if this has already been proposed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see added or changed?
        If you have a specific API in mind, sketch it out here.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or considered.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, prior art from other libraries, etc.
