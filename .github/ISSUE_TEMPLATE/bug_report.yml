name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check [existing issues](https://github.com/LineandVertexSoftware/vertexa-chart/issues) to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm list @lineandvertexsoftware/vertexa-chart`
      placeholder: "0.1.9"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "Chrome 124, Edge 124, Safari 18 …"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        A code snippet, CodePen, or StackBlitz link that reproduces the issue.
        The smaller the better — strip unrelated traces and options.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, related issues, anything else that might help.
